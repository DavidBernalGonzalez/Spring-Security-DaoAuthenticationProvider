spring.application.name=ApiRest

# ==============================================================
# JPA / Hibernate
# ==============================================================

# Create and drop database automatically when app starts and stops
spring.jpa.hibernate.ddl-auto=create-drop

# Show SQL queries in console
spring.jpa.show-sql=true


# ==============================================================
# MySQL Datasource
# ==============================================================

# Database connection URL
spring.datasource.url=jdbc:mysql://localhost:3306/securitydb?useSSL=false&serverTimezone=UTC

# MySQL user
spring.datasource.username=admin

# MySQL password
spring.datasource.password=admin

# Explicit MySQL driver (recommended)
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# ==============================================================
# Spring Security
# ==============================================================

# Enable detailed Spring Security logs
logging.level.org.springframework.security=TRACE
logging.level.org.springframework.security.web.FilterChainProxy=TRACE

# --------------------------------------------------------------
# Default in-memory user for Spring Security
# --------------------------------------------------------------

# Username for basic authentication
spring.security.user.name=admin

# Password for basic authentication
spring.security.user.password=1234